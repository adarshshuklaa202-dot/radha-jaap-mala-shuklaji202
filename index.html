<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neon Maths Player</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
body{margin:0;padding:20px;font-family:Arial;background:#0b1120;color:#fff;display:flex;flex-direction:column;align-items:center;transition:.3s}
body.light{background:#f1f5f9;color:#000}
.neon-border{height:4px;width:100%;background:linear-gradient(90deg,#f00,#ff0,#0f0,#0ff,#00f,#f0f,#f00);background-size:300%;animation:nb 5s linear infinite;border-radius:20px}
@keyframes nb{0%{background-position:0}50%{background-position:100%}100%{background-position:0}}
.neon-title{font-size:28px;font-weight:800;background:linear-gradient(90deg,#f00,#ff0,#0f0,#0ff,#00f,#f0f);-webkit-background-clip:text;color:transparent;text-align:center}

.player-wrap{width:720px;max-width:96vw;margin-top:20px}
.player-border{padding:6px;border-radius:16px;background:linear-gradient(90deg,#ff0059,#ffb100,#39ff14,#00c8ff,#b400ff,#ff0059);background-size:300% 300%;animation:ab 4s linear infinite}
@keyframes ab{0%{background-position:0 50%}50%{background-position:100% 50%}100%{background-position:0 50%}}

.player-box{background:#111827;border-radius:12px;overflow:hidden}
video{width:100%;background:#000}

.controls{display:flex;flex-wrap:wrap;gap:10px;align-items:center;background:#0f172a;padding:10px}
.btn{cursor:pointer;font-size:20px}
#seek{flex:1}

.playlist{width:720px;max-width:96vw;background:#111827;margin-top:20px;border-radius:12px;padding:10px}
#search{width:100%;padding:8px;border-radius:6px;border:none;background:#1e293b;color:#fff;margin-bottom:10px}
.cat{color:#38bdf8;font-weight:bold;margin:12px 0 6px}
.item{padding:8px;background:#1e293b;border-radius:6px;margin-bottom:6px;cursor:pointer}
.item.active{background:#475569}

.pwrap{width:100%;height:4px;background:#334155;border-radius:4px;margin-top:6px;overflow:hidden}
.pbar{height:100%;width:0%;background:#22c55e}

#overall{margin-top:10px;font-weight:bold;color:#22c55e}
</style>
</head>

<body>

<button onclick="document.body.classList.toggle('light')">Toggle Theme</button>

<div style="width:100%">
<div class="neon-border"></div>
<h2 class="neon-title">⚡ Powered By ADARSH SHUKLA ⚡</h2>
</div>

<div id="overall">Course Progress: 0%</div>

<div class="player-wrap">
<div class="player-border">
<div class="player-box">
<video id="video"></video>

<div class="controls">
<span class="btn" id="prev">⏮️</span>
<span class="btn" id="play">⏯️</span>
<span class="btn" id="next">⏭️</span>

<span id="cur">0:00</span>
<input type="range" id="seek" value="0">
<span id="dur">0:00</span>

<span class="btn" id="speed">1x</span>
<span class="btn" id="mute">🔊</span>
<input type="range" id="vol" value="80">
<span class="btn" id="fs">⛶</span>
</div>
</div>
</div>
</div>

<div class="playlist">
<input id="search" placeholder="Search lecture...">
<div id="list"></div>
</div>

<script>
const videos=[
{cat:"Demo",title:"Demo 01",url:"https://appx-transcoded-videos-mcdn.akamai.net.in/videos/rozgar-data/589549-1708539051/hls-a3384a/720p/master-5463994.142935924.m3u8"},
{cat:"Demo",title:"Demo 02",url:"https://appx-transcoded-videos-mcdn.akamai.net.in/videos/rozgar-data/592603-1708664513/hls-9cfaf6/720p/master-2168770.9987318506.m3u8"},
{cat:"Factors",title:"Factors 01",url:"https://appx-transcoded-videos-mcdn.akamai.net.in/videos/rozgar-data/597073-1708787994/hls-9fd3d2/720p/master-7508255.533389853.m3u8"},
{cat:"Zeros",title:"Zeros 01",url:"https://appx-transcoded-videos-mcdn.akamai.net.in/videos/rozgar-data/605822-1709132523/hls-1b8760/720p/master-1484351.1003075903.m3u8"},
{cat:"LCM & HCF",title:"LCM 01",url:"https://appx-transcoded-videos-mcdn.akamai.net.in/videos/rozgar-data/654286-1710775059/hls-a68e9a/720p/master-7792794.920744972.m3u8"},
{cat:"Time & Work",title:"Time & Work 01",url:"https://appx-transcoded-videos-mcdn.akamai.net.in/videos/rozgar-data/686573-1711983130/hls-702307/720p/master-858638.5508880245.m3u8"}
];

const video=document.getElementById("video");
const list=document.getElementById("list");
let hls=null,idx=0;
let progress=JSON.parse(localStorage.getItem("progress")||"{}");

let last="";
videos.forEach((v,i)=>{
 if(v.cat!==last){list.innerHTML+=`<div class="cat">${v.cat}</div>`;last=v.cat;}
 list.innerHTML+=`
 <div class="item" data-i="${i}">
  ${v.title}
  <div class="pwrap"><div class="pbar" style="width:${progress[i]||0}%"></div></div>
 </div>`;
});

document.querySelectorAll(".item").forEach(el=>el.onclick=()=>load(+el.dataset.i));

function load(i){
 idx=i;
 document.querySelectorAll(".item").forEach((e,x)=>e.classList.toggle("active",x===i));
 if(hls)hls.destroy();
 if(Hls.isSupported()){hls=new Hls();hls.loadSource(videos[i].url);hls.attachMedia(video);}
 else video.src=videos[i].url;
 video.play();
}

load(0);

play.onclick=()=>video.paused?video.play():video.pause();
next.onclick=()=>load((idx+1)%videos.length);
prev.onclick=()=>load((idx-1+videos.length)%videos.length);
video.onended=()=>next.onclick();

video.ontimeupdate=()=>{
 if(!video.duration) return;
 seek.value=(video.currentTime/video.duration)*100;
 cur.textContent=time(video.currentTime);
 dur.textContent=time(video.duration);
 progress[idx]=(video.currentTime/video.duration)*100;
 localStorage.setItem("progress",JSON.stringify(progress));
 updateBars();
};

seek.oninput=()=>video.currentTime=(seek.value/100)*video.duration;
vol.oninput=()=>video.volume=vol.value/100;
mute.onclick=()=>{video.muted=!video.muted;mute.textContent=video.muted?"🔇":"🔊";};

let sp=[0.5,1,1.5,2],si=1;
speed.onclick=()=>{si=(si+1)%sp.length;video.playbackRate=sp[si];speed.textContent=sp[si]+"x";};
fs.onclick=()=>video.requestFullscreen();

search.oninput=()=>{
 let q=search.value.toLowerCase();
 document.querySelectorAll(".item").forEach(e=>{
  e.style.display=e.textContent.toLowerCase().includes(q)?"block":"none";
 });
};

function updateBars(){
 let sum=0,c=0;
 document.querySelectorAll(".item").forEach((e,i)=>{
  let b=e.querySelector(".pbar");
  if(progress[i]){b.style.width=progress[i]+"%";sum+=progress[i];c++}
 });
 document.getElementById("overall").textContent=
  "Course Progress: "+(c?(sum/c).toFixed(1):0)+"%";
}

function time(t){let m=Math.floor(t/60),s=Math.floor(t%60);return m+":"+(s<10?"0":"")+s;}
updateBars();
</script>

</body>
</html>
