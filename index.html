<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>राधा नाम जप & हनुमान चालीसा</title>

<style>
:root{
  --accent:#ff8a00;
  --accent2:#ffa733;
  font-family:'Poppins',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:#070707;color:#fff;overflow-x:hidden}

/* Loading */
#loadingPage{
display:flex;justify-content:center;align-items:center;
flex-direction:column;height:100vh;background:black;
}
.spinner{
width:120px;height:120px;border:8px solid transparent;
border-top:8px solid yellow;border-radius:50%;
animation:spin 1s linear infinite;
}
@keyframes spin{100%{transform:rotate(360deg)}}
.loading-name{
margin-top:20px;
font-size:20px;
font-weight:bold;
color:#ffae00;
text-shadow:0 0 15px orange,0 0 25px yellow;
}

/* Welcome */
#welcomePage{
display:none;height:100vh;
flex-direction:column;align-items:center;justify-content:center;
background:linear-gradient(-45deg,#1a1a1a,#2b0f0f,#000,#331a00);
background-size:400% 400%;
animation:grad 10s infinite alternate;
text-align:center;padding:20px;
}
@keyframes grad{0%{background-position:0%}100%{background-position:100%}}

.logo{
width:120px;height:120px;border-radius:30px;
background:linear-gradient(135deg,var(--accent),var(--accent2));
display:grid;place-items:center;
font-size:60px;font-weight:bold;
color:yellow;box-shadow:0 0 40px orange;
margin-bottom:20px;
}

#welcomeDesc{
margin:10px 0 20px 0;
color:#ccc;font-size:16px;
cursor:pointer;
}

.card{
background:rgba(255,255,255,0.05);
padding:25px;border-radius:15px;
width:300px;
}

input{
width:100%;padding:10px;margin:8px 0;
border-radius:8px;border:none;
background:#111;color:#fff;
}

.btn{
background:linear-gradient(90deg,var(--accent),var(--accent2));
border:none;padding:8px 12px;
border-radius:8px;font-weight:600;
cursor:pointer;
}

/* App */
#appPage{display:none;padding:20px;text-align:center}

.circle-wrapper{
display:flex;justify-content:center;align-items:center;
margin:25px 0;
}

.big-circle{
width:240px;height:240px;border-radius:50%;
background:radial-gradient(circle,rgba(255,255,0,0.15),#000);
border:4px solid yellow;
display:flex;align-items:center;justify-content:center;
cursor:pointer;
}

.inner-circle{
font-size:48px;color:yellow;font-weight:bold;
}

.bbox{
background:#111;padding:6px 10px;
border-radius:8px;margin:4px;display:inline-block;
font-size:14px;
}

.action-row{
margin-top:15px;
display:flex;justify-content:center;
gap:8px;flex-wrap:wrap;
}

.action-btn{
background:#1a1a1a;
border:1px solid orange;
color:orange;
padding:6px 10px;
border-radius:6px;
font-size:13px;
cursor:pointer;
}

.powered{
margin-top:15px;
font-weight:bold;
color:#ffae00;
text-shadow:0 0 10px orange,0 0 20px yellow;
}

/* Popup */
.popup{
display:none;position:fixed;
top:0;left:0;width:100%;height:100%;
background:rgba(0,0,0,0.8);
justify-content:center;align-items:center;
}

.popup-box{
background:#1a1a1a;padding:20px;
border-radius:15px;width:85%;
max-height:70%;overflow:auto;
position:relative;
}

.popup-box div{
background:#111;padding:8px;margin:5px 0;
border-radius:8px;color:yellow;cursor:pointer;
}

.backBtn{
position:absolute;top:10px;right:10px;
background:yellow;color:black;
border:none;padding:5px 10px;
border-radius:8px;cursor:pointer;
}

.wordFly{
position:fixed;color:yellow;font-weight:700;
pointer-events:none;font-size:18px;
}
</style>
</head>

<body>

<!-- Loading -->
<div id="loadingPage">
<div class="spinner"></div>
<div class="loading-name">loading</div>
</div>

<!-- Welcome -->
<div id="welcomePage">
<div class="logo">ॐ</div>
<h2 id="welcomeTitle">स्वागत है</h2>
<p id="welcomeDesc">राधा नाम जप और हनुमान चालीसा – काउंटिंग, माला और भजन</p>

<div class="card">
<div id="loginForm">
<input type="email" id="loginEmail" placeholder="Email">
<input type="password" id="loginPassword" placeholder="Password">
<button class="btn" onclick="login()">Login</button>
<p style="color:orange;cursor:pointer" onclick="showSignup()">Create Account</p>
</div>

<div id="signupForm" style="display:none">
<input type="email" id="signupEmail" placeholder="Email">
<input type="password" id="signupPassword" placeholder="Password">
<button class="btn" onclick="signup()">Signup</button>
<p style="color:orange;cursor:pointer" onclick="showLogin()">Already have account?</p>
</div>
</div>
</div>

<!-- App -->
<div id="appPage">

<h2>राधा नाम जप</h2>

<div class="bbox">⏱ <span id="time">00:00</span></div>
<div class="bbox">🔥 <span id="streak">0</span></div>

<div class="circle-wrapper">
<div class="big-circle" id="tapArea">
<div class="inner-circle" id="count">0</div>
</div>
</div>

<div>
<div class="bbox">माला <span id="mala">0</span></div>
<div class="bbox">आज <span id="today">0</span></div>
<div class="bbox">कुल <span id="total">0</span></div>
</div>

<div class="action-row">
<div class="action-btn" onclick="openNames()">28 नाम</div>
<div class="action-btn" onclick="openHistory()">इतिहास</div>
<div class="action-btn" onclick="resetAll()">Reset</div>
<div class="action-btn" onclick="changeBg()">Background</div>
</div>

<div class="powered">Powered by Adarsh Shukla</div>

</div>

<!-- Popups -->
<div class="popup" id="namePopup">
<div class="popup-box">
<button class="backBtn" onclick="closePopup('namePopup')">Back</button>
<div id="nameList"></div>
</div>
</div>

<div class="popup" id="historyPopup">
<div class="popup-box">
<button class="backBtn" onclick="closePopup('historyPopup')">Back</button>
<div id="historyList"></div>
</div>
</div>

<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.5.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.5.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyALDsUb14vKOHt-3rA1cqQzqKLJrSTl8mY",
  authDomain: "radha-jaap-mala.firebaseapp.com",
  projectId: "radha-jaap-mala",
  storageBucket: "radha-jaap-mala.firebasestorage.app",
  messagingSenderId: "582552451696",
  appId: "1:582552451696:web:8f83abf48da0622738d2b5"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.login = async ()=>{
try{
await signInWithEmailAndPassword(auth,loginEmail.value,loginPassword.value);
startApp();
}catch(e){alert(e.message)}
}

window.signup = async ()=>{
try{
await createUserWithEmailAndPassword(auth,signupEmail.value,signupPassword.value);
alert("Registered!");
showLogin();
}catch(e){alert(e.message)}
}
</script>

<script>
setTimeout(()=>{loadingPage.style.display="none";welcomePage.style.display="flex"},1500)

function showSignup(){loginForm.style.display="none";signupForm.style.display="block"}
function showLogin(){signupForm.style.display="none";loginForm.style.display="block"}
function startApp(){welcomePage.style.display="none";appPage.style.display="block"}

let total=0,today=0,mala=0,streak=0,seconds=0,timerStarted=false
let selectedName="राधा"
let history=[]

const names=["राधा","श्रीकृष्ण","हनुमान","सीता राम","दुर्गा","काली","लक्ष्मी","सरस्वती","गणेश","शिव","महादेव","नारायण","विष्णु","शंकर","बजरंगबली","श्री राम","श्रीनाथ","बालाजी","रुक्मिणी","विट्ठल","पार्वती","अदिति","भवानी","महाकाल","कालिका","अन्नपूर्णा","माँ संतोषी","नृसिंह"]

names.forEach(n=>{
let d=document.createElement("div")
d.innerText=n
d.onclick=()=>{selectedName=n;closePopup('namePopup')}
nameList.appendChild(d)
})

function openNames(){namePopup.style.display="flex"}
function openHistory(){
historyList.innerHTML=""
if(history.length===0){
historyList.innerHTML="<div>No History</div>"
}else{
history.forEach(h=>{
let d=document.createElement("div")
d.innerText=`${h.name} | ${h.time}`
historyList.appendChild(d)
})
}
historyPopup.style.display="flex"
}
function closePopup(id){document.getElementById(id).style.display="none"}

function resetAll(){
if(confirm("Reset?")){
total=today=mala=streak=seconds=0
count.innerText="0"
document.getElementById("mala").innerText="0"
document.getElementById("today").innerText="0"
document.getElementById("total").innerText="0"
document.getElementById("streak").innerText="0"
time.innerText="00:00"
history=[]
}
}

function changeBg(){
const colors=["#000","#1a1a1a","#330000","#001133"]
document.body.style.background=colors[Math.floor(Math.random()*colors.length)]
}

function startTimer(){
setInterval(()=>{
seconds++
time.innerText=Math.floor(seconds/60).toString().padStart(2,"0")+":"+Math.floor(seconds%60).toString().padStart(2,"0")
},1000)
}

tapArea.onclick=()=>{
if(!timerStarted){timerStarted=true;startTimer()}
total++;today++;streak++
if(total%108===0)mala++

count.innerText=today
document.getElementById("mala").innerText=mala
document.getElementById("today").innerText=today
document.getElementById("total").innerText=total
document.getElementById("streak").innerText=streak

history.push({name:selectedName,time:new Date().toLocaleTimeString()})

const rect=tapArea.getBoundingClientRect()
const cx=rect.left+rect.width/2
const cy=rect.top+rect.height/2

for(let i=0;i<8;i++){
let word=document.createElement("div")
word.className="wordFly"
word.innerText=selectedName
document.body.appendChild(word)
word.style.left=cx+"px"
word.style.top=cy+"px"
let angle=(Math.PI/4)*i
let dist=160+Math.random()*50
word.style.transition="1s"
setTimeout(()=>{
word.style.transform=`translate(${Math.cos(angle)*dist}px,${Math.sin(angle)*dist}px)`
word.style.opacity=0
},50)
setTimeout(()=>{document.body.removeChild(word)},1000)
}
}
</script>

</body>
</html>
