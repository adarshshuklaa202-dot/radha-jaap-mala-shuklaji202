<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>राधा नाम जप & हनुमान चालीसा</title>

<style>
body{
margin:0;
background:#000;
color:white;
font-family:'Poppins',sans-serif;
text-align:center;
overflow-x:hidden;
transition:background 0.5s;
}

/* ================= LOADER ================= */
#loader{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:radial-gradient(circle,#200000,#000);
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
z-index:99999;
}

.loader-circle{
width:90px;
height:90px;
border:8px solid #330000;
border-top:8px solid #ff0000;
border-radius:50%;
animation:spin 1s linear infinite;
box-shadow:0 0 25px red;
}

.loader-text{
margin-top:25px;
color:#ff4d4d;
font-size:22px;
font-weight:700;
letter-spacing:2px;
text-shadow:0 0 20px red;
}

@keyframes spin{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}

/* ================= WELCOME ================= */
.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:radial-gradient(circle,#150000,#000);
}

.hero h2{
font-size:45px;
color:#ff2e2e;
text-shadow:0 0 35px red;
}

.hero p{
color:#ff9999;
margin-top:10px;
}

.enter-btn{
margin-top:35px;
padding:15px 35px;
font-size:20px;
border:none;
border-radius:30px;
background:#ff0000;
color:white;
cursor:pointer;
box-shadow:0 0 25px red;
transition:0.3s;
}

.enter-btn:hover{
transform:scale(1.1);
box-shadow:0 0 40px red;
}

/* ================= MAIN UI ================= */
#mainContent{display:none;}

h1{color:#ff8c2a;font-size:32px;margin-top:20px;text-shadow:0 0 18px rgba(255,140,42,0.6);}

.tabs{margin-top:20px;display:flex;justify-content:center;gap:12px;}
.tab{padding:12px 18px;background:#111;border-radius:10px;border:1px solid #333;color:#ccc;}
.tab.active{background:linear-gradient(180deg,#ff8a26,#ff6200);color:white;}

.top-stats{display:flex;justify-content:center;gap:16px;margin-top:25px;}
.stat-box{background:#141414;padding:10px 18px;border-radius:12px;border:1px solid #262626;}
.stat-box span{display:block;color:#ff8224;font-weight:700;font-size:17px;}

.circle-wrap{margin-top:20px;display:flex;justify-content:center;}
.big-circle{
width:300px;height:300px;border-radius:50%;
background:radial-gradient(circle,rgba(255,120,20,0.15),rgba(0,0,0,1));
border:4px solid rgba(255,140,42,0.5);
display:flex;justify-content:center;align-items:center;
position:relative;box-shadow:0 0 45px rgba(255,120,20,0.1);
cursor:pointer;
}

.inner-circle{
width:180px;height:180px;border-radius:50%;
background:#0d0d0d;border:3px solid #ff8d22;
display:flex;justify-content:center;align-items:center;
font-size:65px;color:#ffa24d;font-weight:700;
text-shadow:0 0 12px rgba(255,120,20,0.5);
}

.rise{
position:absolute;font-weight:700;font-size:22px;
color:#ffb366;opacity:1;pointer-events:none;
}

.bottom-boxes{display:flex;justify-content:center;gap:12px;margin-top:28px;}
.bbox{background:#111;width:110px;padding:10px;border-radius:12px;border:1px solid #222;}
.bbox .num{color:#ff8e34;font-size:22px;font-weight:700;}

.buttons{margin-top:25px;display:flex;justify-content:center;flex-wrap:wrap;}
.btn{padding:12px 18px;border-radius:12px;background:#1a1a1a;margin:5px;border:1px solid #333;color:#ddd;cursor:pointer;}
.btn.orange{background:linear-gradient(180deg,#ff8925,#ff6100);border:none;color:white;}

.music-btn{
background:#ff8c2a;color:#000;
padding:12px 22px;border-radius:12px;
margin-top:20px;font-weight:700;border:none;cursor:pointer;
}

#namePopup,#historyPopup{
position:fixed;top:0;left:0;width:100%;height:100%;
background:rgba(0,0,0,0.8);
display:none;justify-content:center;align-items:center;
}

.popup-box{
width:80%;max-height:70%;
background:#1a1a1a;border:2px solid #ff7a1f;
border-radius:16px;padding:20px;overflow-y:scroll;
box-shadow:0 0 25px #ff7a1f;
}

.popup-box div{
padding:12px;margin:8px 0;
background:#111;border-radius:10px;
border:1px solid #333;font-size:20px;
color:#ff9a40;cursor:pointer;
}

footer{
margin-top:35px;color:#ff9a40;
font-weight:700;font-size:18px;
text-shadow:0 0 15px #ff7a1f;
}
</style>
</head>

<body>

<!-- LOADER -->
<div id="loader">
<div class="loader-circle"></div>
<div class="loader-text">Loading Divine Energy...</div>
</div>

<!-- WELCOME -->
<div class="hero" id="welcomeScreen">
<h2>✨ Welcome ✨</h2>
<p>by Adarsh Shukla</p>
<button class="enter-btn" onclick="enterSite()">🚩 प्रवेश करें</button>
</div>

<!-- MAIN CONTENT -->
<div id="mainContent">

<h1>राधा नाम जप & हनुमान चालीसा</h1>

<button id="musicBtn" class="music-btn">▶ भक्ति संगीत चलाएँ</button>
<audio id="bgMusic" loop>
<source src="radha.mp3" type="audio/mpeg">
</audio>

<div class="tabs">
<div class="tab active">ॐ जप</div>
<div class="tab">हनुमान चालीसा</div>
<div class="tab">भजन</div>
</div>

<div class="top-stats">
<div class="stat-box">⏱ <span id="time">00:00</span></div>
<div class="stat-box">🔥 Streak: <span id="streak">0</span></div>
</div>

<div class="circle-wrap">
<div class="big-circle" id="tapArea">
<div class="inner-circle" id="count">0</div>
</div>
</div>

<div class="bottom-boxes">
<div class="bbox"><span class="num" id="mala">0</span>माला</div>
<div class="bbox"><span class="num" id="today">0</span>आज</div>
<div class="bbox"><span class="num" id="total">0</span>कुल</div>
</div>

<div class="buttons">
<button class="btn orange" id="openNames">28 नाम</button>
<button class="btn orange" id="openHistory">इतिहास</button>
<button class="btn" id="resetBtn">Reset</button>
<button class="btn" id="changeBgBtn">🌈 Background बदलें</button>
</div>

<div id="namePopup"><div class="popup-box" id="nameList"></div></div>
<div id="historyPopup"><div class="popup-box" id="historyList"></div></div>

<footer>Powered by Adarsh Shukla</footer>

</div>

<script>

/* LOADER */
window.addEventListener("load",()=>{
setTimeout(()=>{
document.getElementById("loader").style.display="none";
},2500);
});

function enterSite(){
document.getElementById("welcomeScreen").style.display="none";
document.getElementById("mainContent").style.display="block";
}

/* MAIN LOGIC */
let total=0,today=0,mala=0,streak=0,seconds=0,timerStarted=false;
let selectedName="राधा",tapHistory=[];
let display=document.getElementById("count");

const names=["राधा","श्रीकृष्ण","हनुमान","सीता राम","दुर्गा","काली","लक्ष्मी","सरस्वती","गणेश","शिव","महादेव","नारायण","विष्णु","शंकर","बजरंगबली","श्री राम","श्रीनाथ","बालाजी","रुक्मिणी","विट्ठल","पार्वती","अदिति","भवानी","महाकाल","कालिका","अन्नपूर्णा","माँ संतोषी","नृसिंह"];

let list=document.getElementById("nameList");
names.forEach(n=>{
let d=document.createElement("div");
d.innerText=n;
d.onclick=()=>{selectedName=n;document.getElementById("namePopup").style.display="none";};
list.appendChild(d);
});

document.getElementById("openNames").onclick=()=>{document.getElementById("namePopup").style.display="flex";};
document.getElementById("openHistory").onclick=()=>{
let historyBox=document.getElementById("historyList");
historyBox.innerHTML="";
if(tapHistory.length===0){historyBox.innerHTML="<div>कोई इतिहास नहीं</div>";}
else{
tapHistory.forEach((h,i)=>{
let d=document.createElement("div");
d.innerText=`Tap ${i+1}: ${h.name} | कुल: ${h.total} | समय: ${h.time}`;
historyBox.appendChild(d);
});
}
document.getElementById("historyPopup").style.display="flex";
};

let music=document.getElementById("bgMusic");
document.getElementById("musicBtn").onclick=()=>{
if(music.paused){music.play();musicBtn.innerText="⏸ संगीत रोकें";}
else{music.pause();musicBtn.innerText="▶ भक्ति संगीत चलाएँ";}
};

const backgrounds=[
"linear-gradient(135deg,#000,#434343)",
"linear-gradient(135deg,#0f2027,#203a43,#2c5364)",
"linear-gradient(135deg,#ff7e5f,#feb47b)",
"linear-gradient(135deg,#6a11cb,#2575fc)",
"linear-gradient(135deg,#ff512f,#dd2476)"
];

document.getElementById("changeBgBtn").onclick=()=>{
document.body.style.background=backgrounds[Math.floor(Math.random()*backgrounds.length)];
};

function startTimer(){
setInterval(()=>{
seconds++;
document.getElementById("time").innerText=formatTime(seconds);
},1000);
}

function formatTime(sec){
let m=Math.floor(sec/60),s=sec%60;
return (m<10?'0':'')+m+":"+(s<10?'0':'')+s;
}

document.getElementById("tapArea").onclick=()=>{
if(!timerStarted){timerStarted=true;startTimer();}
total++;today++;mala=Math.floor(total/108);streak++;
display.innerText=today;
document.getElementById("mala").innerText=mala;
document.getElementById("today").innerText=today;
document.getElementById("total").innerText=total;
document.getElementById("streak").innerText=streak;
tapHistory.push({name:selectedName,total:total,time:formatTime(seconds)});
if(navigator.vibrate) navigator.vibrate(40);

for(let i=0;i<5;i++){
let r=document.createElement("div");
r.className="rise";
r.innerText=selectedName;
r.style.left="50%";
r.style.top="50%";
r.style.transform="translate(-50%, -50%)";
tapArea.appendChild(r);
let dx=(Math.random()-0.5)*200;
let dy=(Math.random()-0.5)*200;
r.animate([
{transform:'translate(-50%, -50%)',opacity:1},
{transform:`translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px)) scale(1.5)`,opacity:0}
],{duration:1000,easing:'ease-out'});
setTimeout(()=>r.remove(),1000);
}
};

document.getElementById("resetBtn").onclick=()=>{
total=today=mala=streak=seconds=0;
display.innerText=0;
document.getElementById("mala").innerText=0;
document.getElementById("today").innerText=0;
document.getElementById("total").innerText=0;
document.getElementById("streak").innerText=0;
tapHistory=[];
document.getElementById("time").innerText="00:00";
timerStarted=false;
};

document.getElementById("namePopup").onclick=e=>{if(e.target===e.currentTarget)e.currentTarget.style.display="none";};
document.getElementById("historyPopup").onclick=e=>{if(e.target===e.currentTarget)e.currentTarget.style.display="none";};

</script>

</body>
</html>
