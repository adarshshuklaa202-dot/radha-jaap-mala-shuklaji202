<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌈 Happy Holi 2026 🌈</title>

<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Baloo 2', cursive;
}

body{
  height:100vh;
  overflow:hidden;
  background:black;
  display:flex;
  justify-content:center;
  align-items:center;
}

canvas{
  position:absolute;
  top:0;
  left:0;
  z-index:-1;
}

.card{
  width:370px;
  padding:30px;
  text-align:center;
  border-radius:25px;
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(18px);
  box-shadow:0 0 40px rgba(255,255,255,0.4);
  transition:transform 0.1s;
}

h1{
  font-size:36px;
  color:white;
  text-shadow:0 0 20px #fff,0 0 40px yellow;
  animation:glow 2s infinite alternate;
}

@keyframes glow{
  from{ text-shadow:0 0 10px #fff;}
  to{ text-shadow:0 0 35px #ff0;}
}

p{
  margin:15px 0;
  color:white;
  font-size:17px;
}

input{
  padding:10px;
  border:none;
  border-radius:20px;
  width:85%;
  text-align:center;
  font-size:15px;
}

button{
  margin-top:10px;
  padding:8px 20px;
  border:none;
  border-radius:20px;
  cursor:pointer;
  font-size:16px;
  background:white;
  color:#ff0080;
  transition:0.3s;
}

button:hover{
  background:yellow;
  transform:scale(1.1);
}

footer{
  position:absolute;
  bottom:10px;
  color:white;
  font-size:14px;
}
</style>
</head>

<body>

<canvas id="canvas"></canvas>

<div class="card" id="card">
  <h1>🌈 Happy Holi 🌈</h1>
  <p id="wish">
    आपको और आपके पूरे परिवार को रंगों से भरी,
    खुशियों से सजी, प्यार और समृद्धि वाली
    होली 2026 की हार्दिक शुभकामनाएँ ❤️🔥
  </p>
  <input type="text" id="name" placeholder="अपना नाम लिखें">
  <br>
  <button onclick="setWish()">🎨 Personal Wish</button>
</div>

<footer>
  Powered by Adarsh Shukla
</footer>

<script>

/* ========= REAL FIRECRACKER SOUND (WEB AUDIO API) ========= */

let audioCtx;

function initAudio(){
  if(!audioCtx){
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
}

document.addEventListener("click", initAudio, {once:true});

function playCrackSound(){
  if(!audioCtx) return;

  const bufferSize = audioCtx.sampleRate * 0.2;
  const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
  const data = buffer.getChannelData(0);

  for (let i = 0; i < bufferSize; i++) {
    data[i] = Math.random() * 2 - 1;
  }

  const noise = audioCtx.createBufferSource();
  noise.buffer = buffer;

  const gainNode = audioCtx.createGain();
  gainNode.gain.setValueAtTime(1, audioCtx.currentTime);
  gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);

  noise.connect(gainNode);
  gainNode.connect(audioCtx.destination);
  noise.start();
}

/* ========= 3D TILT ========= */

let card=document.getElementById("card");

document.addEventListener("mousemove",(e)=>{
  let x=(window.innerWidth/2 - e.pageX)/25;
  let y=(window.innerHeight/2 - e.pageY)/25;
  card.style.transform=`rotateY(${x}deg) rotateX(${y}deg)`;
});

/* ========= CANVAS ========= */

const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let particles=[];

function createParticle(x,y,amount=25){

  playCrackSound();

  for(let i=0;i<amount;i++){
    particles.push({
      x:x,
      y:y,
      size:Math.random()*8+4,
      color:`hsl(${Math.random()*360},100%,50%)`,
      speedX:(Math.random()-0.5)*8,
      speedY:(Math.random()-0.5)*8,
      life:100
    });
  }
}

function animate(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  for(let i=0;i<particles.length;i++){
    let p=particles[i];

    ctx.beginPath();
    ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
    ctx.fillStyle=p.color;
    ctx.fill();

    p.x+=p.speedX;
    p.y+=p.speedY;
    p.life--;

    if(p.life<=0){
      particles.splice(i,1);
      i--;
    }
  }

  requestAnimationFrame(animate);
}
animate();

/* CLICK ANYWHERE BLAST */

document.addEventListener("click",(e)=>{
  createParticle(e.clientX,e.clientY,30);
});

/* NAME BASED AUTO BLAST */

let autoInterval;

function setWish(){

  let name=document.getElementById("name").value.trim();

  if(name!=""){

    document.getElementById("wish").innerHTML=
    "🌸 "+name+" जी 🌸<br>आपको और आपके पूरे परिवार को<br>टगड़ी, धमाकेदार और रंगीन होली 2026 की ढेर सारी शुभकामनाएँ! 🔥🌈<br><br>आदर्श शुक्ला के द्वारा";

    let letters=name.length;
    let count=0;

    let blastInterval=setInterval(()=>{
      createParticle(window.innerWidth/2,window.innerHeight/2,40);
      count++;

      if(count>=letters){
        clearInterval(blastInterval);

        autoInterval=setInterval(()=>{
          createParticle(
            Math.random()*window.innerWidth,
            Math.random()*window.innerHeight,
            35
          );
        },2000);

      }
    },400);
  }
}

</script>

</body>
</html>
